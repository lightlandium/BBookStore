{% extends "base.html" %}

{% block title %}Админ-панель – добавление жанра{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Добавить новый жанр</h1>
    <form method="POST" action="{{ url_for('admin.add_genre') }}">
        <div class="mb-3">
            <label for="name" class="form-label">Название жанра</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <button type="submit" class="btn btn-primary">Добавить</button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
